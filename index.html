<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Proximate Text</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- QRCode.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- Google Fonts: Serif for story, Mono for UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-error: #ff3333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Anti-aliasing for crisper text on dark background */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .font-mono {
            font-family: 'Courier Prime', monospace;
        }

        /* Brutalist Buttons & Borders */
        .brutalist-button {
            border: 2px solid var(--text-color);
            background: var(--bg-color);
            color: var(--text-color);
            text-transform: uppercase;
            transition: all 0.1s ease;
            box-shadow: 4px 4px 0px 0px var(--text-color);
        }

        .brutalist-button:hover:not(:disabled) {
            background: var(--text-color);
            color: var(--bg-color);
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px var(--text-color);
            cursor: pointer;
        }

        .brutalist-button:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px 0px var(--text-color);
        }

        .brutalist-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: 4px 4px 0px 0px var(--text-color);
        }

        .brutalist-border {
            border: 2px solid var(--text-color);
        }

        .brutalist-error-border {
            border: 2px solid var(--accent-error);
            color: var(--accent-error);
            box-shadow: 4px 4px 0px 0px var(--accent-error);
        }

        /* Story container typography */
        #story-container {
            /* Smooth fade in */
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #story-container p {
            margin-bottom: 2rem;
            line-height: 1.8;
            font-size: 1.25rem;
            text-align: left;
        }

        /* QR Context */
        #qr-container img {
            margin: 0 auto;
            display: inline-block;
        }
    </style>
</head>

<body class="font-mono p-4 md:p-8 lg:p-12 box-border">

    <div class="max-w-2xl mx-auto w-full relative flex-grow flex flex-col">
        <!-- HEADER -->
        <header class="mb-12 pb-4 border-b-2 border-white">
            <h1 class="text-2xl md:text-5xl font-bold tracking-tight uppercase" id="book-title"></h1>
        </header>

        <!-- SYSTEM MESSAGES -->
        <div id="messages" class="mb-8 hidden shrink-0 text-sm md:text-base">
            <div id="loading" class="animate-pulse p-4 uppercase brutalist-border bg-black text-white">Summoning text...
            </div>
            <div id="error" class="hidden p-4 uppercase brutalist-error-border bg-black"></div>
            <div id="success" class="hidden p-4 uppercase brutalist-border bg-black text-white"></div>
        </div>

        <!-- NAVIGATION -->
        <nav id="chapter-nav" class="mb-12 flex flex-wrap gap-4 text-sm shrink-0">
            <!-- Chapter buttons dynamically injected here -->
        </nav>

        <!-- MAIN TEXT AREA -->
        <!-- Flex-grow pushes footer down if text is short -->
        <main id="story-container" class="font-serif text-gray-200 mb-16 flex-grow">
            <!-- Story text dynamically injected here -->
        </main>

        <!-- ACTIONS / FOOTER -->
        <footer id="actions" class="border-t-2 border-white pt-10 pb-16 hidden shrink-0">
            <div class="flex flex-col items-center">
                <button id="transmit-btn"
                    class="px-6 py-4 font-bold text-lg w-full md:w-auto brutalist-button tracking-wider">
                    Transmit Next Chapter
                </button>

                <div id="qr-wrapper" class="hidden w-full flex-col items-center mt-4">
                    <p
                        class="mb-6 text-sm uppercase text-center border-b border-gray-700 pb-2 tracking-widest text-[#aaaaaa]">
                        Carrier Signal Active. Awaiting Receiver.
                    </p>
                    <div class="bg-white p-6 brutalist-border inline-block flex justify-center w-full max-w-[300px]">
                        <div id="qrcode"></div>
                    </div>
                    <button id="close-qr-btn"
                        class="mt-8 px-4 py-2 text-sm brutalist-button w-full md:w-auto tracking-widest">
                        Cease Transmission
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <!-- MAIN LOGIC -->
    <script src="config.js"></script>
    <script src="index.js"></script>
</body>

</html>
